<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery – Skypoint Angels Academy International</title>
  <link rel="icon" href="assets/images/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/nav.css" />
  <style>
    :root {
      --blue-dark: #0d2461; --blue: #1a4fa0; --blue-light: #2d6fd6;
      --magenta: #1a4fa0; --magenta-light: #1a4fa0;
      --gold: #d4a017; --gold-light: #f5c842;
      --white: #ffffff; --off-white: #f8f9ff; --gray: #6b7280;
      --text-dark: #0d1b3e; --text-body: #374151;
      --radius: 14px; --font-head: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); color: var(--text-body); background: var(--white); }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

    /* HEADER */
    #header { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; transition: all .35s; background: rgba(13,36,97,.92); backdrop-filter: blur(10px); }
    #header.scrolled { background: rgba(13,36,97,.97); }
    .header-top { background: linear-gradient(135deg, var(--blue-dark), var(--blue)); padding: .45rem 0; font-size: .82rem; color: white; }
    .nav-bar { padding: .8rem 0; }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; }
    .nav-logo img { height: 50px; }
    .nav-logo-name { color: white; font-weight: 800; }
    nav a { color: white; padding: .5rem .9rem; font-size: .9rem; }
    nav a.active { background: rgba(255,255,255,.1); border-radius: 8px; }

    /* PAGE HERO */
    .page-hero { min-height: 35vh; display: flex; align-items: center; background: linear-gradient(160deg, var(--blue-dark) 0%, #1a1060 100%); padding-top: 8rem; color: white; }
    .page-hero h1 { font-family: var(--font-head); font-size: 3rem; }

    /* GALLERY GRID */
    .gallery-section { padding: 5rem 0; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .gallery-item { border-radius: var(--radius); overflow: hidden; height: 250px; background: #eee; position: relative; border: 2px solid var(--off-white); transition: transform .3s; }
    .gallery-item:hover { transform: scale(1.02); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    .placeholder-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(13,36,97,0.05); color: var(--gray); font-style: italic; font-size: .85rem; }

    footer { background: var(--blue-dark); color: white; padding: 4rem 0 2rem; text-align: center; }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<section class="page-hero">
  <div class="container">
    <h1>Our Gallery</h1>
    <p>A glimpse into the life and activities of Skypoint Angels Academy International.</p>
  </div>
</section>

<section class="gallery-section">
  <div class="container">
    <div class="gallery-grid">
      <div class="gallery-item"><img src="assets/img1.jpg" alt="Skypoint Activity 1"></div>
      <div class="gallery-item"><img src="assets/img2.jpg" alt="Skypoint Activity 2"></div>
      <div class="gallery-item"><img src="assets/img3.jpg" alt="Skypoint Activity 3"></div>
      <div class="gallery-item"><img src="assets/img1.jpg" alt="Skypoint Activity 4"></div>
      <div class="gallery-item"><img src="assets/img2.jpg" alt="Skypoint Activity 5"></div>
      <div class="gallery-item"><img src="assets/img3.jpg" alt="Skypoint Activity 6"></div>
    </div>
  </div>
</section>

<footer>
  <p>© 2025 Skypoint Angels Academy International. All rights reserved.</p>
</footer>


  <script src="assets/js/nav-dynamic.js"></script>
</body>
</html>
